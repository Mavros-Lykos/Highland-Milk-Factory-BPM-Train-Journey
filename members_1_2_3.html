<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BPM Flowcharts - Members 1, 2 & 3 - Highland Milk Factory</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: #151d30;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #3b82f6;
      --border: #1e293b;
      
      /* Flowchart Symbol Colors */
      --symbol-start-end: #10b981;
      --symbol-action: #3b82f6;
      --symbol-decision: #f59e0b;
      --symbol-input: #06b6d4;
      --symbol-output: #8b5cf6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.5;
      padding: 2rem;
    }

    header {
      max-width: 1200px;
      margin: 0 auto 2rem auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    h1 span {
      color: var(--primary);
    }

    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    select, button {
      background-color: var(--card-bg);
      color: var(--text-main);
      border: 1px solid var(--border);
      padding: 0.6rem 1.2rem;
      border-radius: 0.5rem;
      font-family: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    select:focus, button:hover {
      border-color: var(--primary);
      outline: none;
    }

    button.btn-primary {
      background-color: var(--primary);
      border-color: var(--primary);
      font-weight: 500;
    }

    button.btn-primary:hover {
      opacity: 0.9;
    }

    .stats {
      display: flex;
      gap: 2rem;
      max-width: 1200px;
      margin: 0 auto 2rem auto;
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 1rem 1.5rem;
      border-radius: 0.75rem;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .stat-val {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    .category-group {
      margin-bottom: 2rem;
    }

    .category-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text-muted);
      border-left: 4px solid var(--primary);
      padding-left: 0.75rem;
    }

    .process-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      overflow: hidden;
      margin-bottom: 1rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .process-header {
      padding: 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    .process-header:hover {
      background-color: rgba(255, 255, 255, 0.02);
    }

    .process-title-group {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .diag-num {
      font-family: monospace;
      background: rgba(255, 255, 255, 0.05);
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .process-name {
      font-weight: 600;
      font-size: 1.1rem;
    }

    .toggle-icon {
      font-size: 1.2rem;
      transition: transform 0.2s;
    }

    .process-card.expanded .toggle-icon {
      transform: rotate(180deg);
    }

    .process-content {
      display: none;
      padding: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .process-card.expanded .process-content {
      display: block;
    }
