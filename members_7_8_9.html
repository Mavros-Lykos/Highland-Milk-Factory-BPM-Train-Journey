<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BPM Flowcharts - Members 7, 8 & 9 - Highland Milk Factory</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: #151d30;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --primary: #0d9488;
      --border: #1e293b;
      
      /* Flowchart Symbol Colors */
      --symbol-start-end: #10b981;
      --symbol-action: #3b82f6;
      --symbol-decision: #f59e0b;
      --symbol-input: #06b6d4;
      --symbol-output: #8b5cf6;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      line-height: 1.5;
      padding: 2rem;
    }

    header {
      max-width: 1200px;
      margin: 0 auto 2rem auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.025em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    h1 span {
      color: var(--primary);
    }

    .controls {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    select, button {
      background-color: var(--card-bg);
      color: var(--text-main);
      border: 1px solid var(--border);
      padding: 0.6rem 1.2rem;
      border-radius: 0.5rem;
      font-family: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    select:focus, button:hover {
      border-color: var(--primary);
      outline: none;
    }

    button.btn-primary {
      background-color: var(--primary);
      border-color: var(--primary);
      font-weight: 500;
    }

    button.btn-primary:hover {
      opacity: 0.9;
    }

    .stats {
      display: flex;
      gap: 2rem;
      max-width: 1200px;
      margin: 0 auto 2rem auto;
      background: var(--card-bg);
      border: 1px solid var(--border);
      padding: 1rem 1.5rem;
      border-radius: 0.75rem;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
    }

    .stat-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
    }

    .stat-val {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--primary);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    .category-group {
      margin-bottom: 2rem;
    }

    .category-title {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--text-muted);
      border-left: 4px solid var(--primary);
      padding-left: 0.75rem;
    }

    .process-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      overflow: hidden;
      margin-bottom: 1rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .process-header {
      padding: 1.25rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      user-select: none;
    }

    .process-header:hover {
      background-color: rgba(255, 255, 255, 0.02);
    }

    .process-title-group {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .diag-num {
      font-family: monospace;
      background: rgba(255, 255, 255, 0.05);
      padding: 0.25rem 0.5rem;
      border-radius: 0.25rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .process-name {
      font-weight: 600;
      font-size: 1.1rem;
    }

    .toggle-icon {
      font-size: 1.2rem;
      transition: transform 0.2s;
    }

    .process-card.expanded .toggle-icon {
      transform: rotate(180deg);
    }

    .process-content {
      display: none;
      padding: 1.5rem;
      border-top: 1px solid var(--border);
    }

    .process-card.expanded .process-content {
      display: block;
    }

    /* Flowchart Visualizer */
    .flowchart-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      padding: 2rem;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 0.5rem;
      margin-bottom: 1.5rem;
      overflow-x: auto;
    }

    .flow-node {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0.75rem 1.25rem;
      font-size: 0.9rem;
      font-weight: 500;
      width: 280px;
      min-height: 50px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
      position: relative;
    }

    .node-start, .node-end {
      border: 2px solid var(--symbol-start-end);
      border-radius: 50px;
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
    }

    .node-action {
      border: 2px solid var(--symbol-action);
      border-radius: 4px;
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
    }

    .node-decision {
      border: 2px solid var(--symbol-decision);
      border-radius: 8px;
      background: rgba(245, 158, 11, 0.15);
      color: #fbbf24;
      font-weight: 600;
    }

    .node-input {
      border: 2px solid var(--symbol-input);
      transform: skew(-10deg);
      background: rgba(6, 182, 212, 0.15);
      color: #22d3ee;
    }
    .node-input span {
      transform: skew(10deg);
    }

    .node-output {
      border: 2px solid var(--symbol-output);
      transform: skew(-10deg);
      background: rgba(139, 92, 246, 0.15);
      color: #a78bfa;
    }
    .node-output span {
      transform: skew(10deg);
    }

    .flow-arrow {
      width: 2px;
      height: 24px;
      background-color: var(--text-muted);
      position: relative;
    }

    .flow-arrow::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      border-width: 6px 4px 0 4px;
      border-style: solid;
      border-color: var(--text-muted) transparent transparent transparent;
    }

    .decision-branches {
      display: flex;
      justify-content: space-between;
      width: 420px;
      margin: -5px 0;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
    }

    .comment-box {
      background: rgba(255, 255, 255, 0.02);
      border-left: 4px solid var(--text-muted);
      padding: 1rem;
      border-radius: 0.25rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* Print Styles */
    @media print {
      body {
        background-color: white;
        color: black;
        padding: 0;
      }

      header, .controls, .stats, .toggle-icon, .no-print {
        display: none !important;
      }

      .category-group {
        page-break-inside: avoid;
      }

      .process-card {
        border: none;
        background: transparent;
        margin-bottom: 3rem;
        page-break-inside: avoid;
      }

      .process-header {
        cursor: default;
        padding: 0 0 0.5rem 0;
        border-bottom: 2px solid #000;
      }

      .process-content {
        display: block !important;
        padding: 1rem 0;
      }

      .flowchart-container {
        background: transparent;
        border: none;
        padding: 1rem 0;
      }

      .flow-node {
        color: black !important;
        background: transparent !important;
        border-color: black !important;
      }

      .comment-box {
        border-left-color: #000;
        color: #333;
      }
    }
  </style>
</head>
<body>

    function buildProcessFlow(processName, deptId) {
      let steps = [];
      steps.push({ type: "start", text: `Start: Initiate ${processName} sequence` });
      
      if (deptId === 7) { // Engineering
        steps.push({ type: "input", text: "Acquire preventive maintenance schedule or emergency breakdown ticket details" });
        steps.push({ type: "action", text: "Verify tool availability & shut down power supply line (LOTO protocol)" });
        steps.push({ type: "action", text: "Inspect mechanical/electrical components and replace worn parts" });
        steps.push({ type: "decision", text: "Does equipment performance test meet ISO calibration criteria?", yes: "Commission machine back into service & close work ticket", no: "Escalate to Senior Engineer & schedule specialized contractor repair" });
        steps.push({ type: "action", text: "Log maintenance activities and parts used into Engineering Inventory System" });
        steps.push({ type: "output", text: "Deliver updated equipment log and compliance certificate to Operations" });
      } 
      else if (deptId === 8) { // Transport
        steps.push({ type: "input", text: "Acquire dispatch manifest or collection route log data sheet" });
        steps.push({ type: "action", text: "Execute vehicle safety checks & inspect refrigeration settings (3-4°C)" });
        steps.push({ type: "action", text: "Monitor real-time GPS fleet tracking coordinates" });
        steps.push({ type: "decision", text: "Are temperature parameters verified within cold chain limit?", yes: "Proceed along route and record proof of delivery receipt", no: "Instruct driver to divert tanker and initiate emergency cold chain protocols" });
        steps.push({ type: "action", text: "Submit final trip sheet details & fuel consumption records" });
        steps.push({ type: "output", text: "Generate daily transport log and send fuel usage statement to Finance" });
      } 
      else { // Procurement
        steps.push({ type: "input", text: "Review material requisition requests or incoming supplier quotes" });
        steps.push({ type: "action", text: "Ensure compliance with government tender procurement rules" });
        steps.push({ type: "action", text: "Select candidate vendor & generate official purchase order (PO)" });
        steps.push({ type: "decision", text: "Does procurement amount require Government Procurement Committee approval?", yes: "Submit documentation to Committee and wait for official sign-off", no: "Approve order directly and transmit purchase order to supplier" });
        steps.push({ type: "action", text: "Receive materials, generate Goods Received Note (GRN), and allocate storage bins" });
        steps.push({ type: "output", text: "Dispatch certified GRN and matching supplier invoice to Accounts Payable" });
      }

      steps.push({ type: "end", text: `End: ${processName} cycle complete` });
      return steps;
    }

    function generateComment(processName) {
      return `BPM process validated for Highland Milk Factory, Pattipola. All steps comply with RMV/NTC transport safety rules and government procurement guidelines.`;
    }

    function loadDepartment() {
      const deptId = document.getElementById("deptSelect").value;
      const dept = departments[deptId];
      
      document.getElementById("deptLabel").innerText = dept.shortName;
      document.getElementById("ownerLabel").innerText = dept.owner;
      
      const main = document.getElementById("processList");
      main.innerHTML = "";
      
      let index = 1;
      dept.categories.forEach(cat => {
        const catGroup = document.createElement("div");
        catGroup.className = "category-group";
        
        const catTitle = document.createElement("div");
        catTitle.className = "category-title";
        catTitle.innerText = cat.name;
        catGroup.appendChild(catTitle);
        
        cat.processes.forEach(proc => {
          const card = document.createElement("div");
          card.className = "process-card";
          card.id = `proc-${index}`;
          
          const header = document.createElement("div");
          header.className = "process-header";
          header.onclick = () => card.classList.toggle("expanded");
          
          const titleGroup = document.createElement("div");
          titleGroup.className = "process-title-group";
          
          const diagNum = document.createElement("span");
          diagNum.className = "diag-num";
          diagNum.innerText = `D-${deptId}.${index.toString().padStart(2, '0')}`;
          
          const procName = document.createElement("span");
          procName.className = "process-name";
          procName.innerText = proc;
          
          titleGroup.appendChild(diagNum);
          titleGroup.appendChild(procName);
          
          const toggle = document.createElement("span");
          toggle.className = "toggle-icon";
          toggle.innerText = "▼";
          
          header.appendChild(titleGroup);
          header.appendChild(toggle);
          card.appendChild(header);
          
          const content = document.createElement("div");
          content.className = "process-content";
          
          const flowContainer = document.createElement("div");
          flowContainer.className = "flowchart-container";
          
          const steps = buildProcessFlow(proc, parseInt(deptId));
          
          steps.forEach((step, sIdx) => {
            const node = document.createElement("div");
            node.className = `flow-node node-${step.type}`;
            node.innerHTML = `<span>${step.text}</span>`;
            flowContainer.appendChild(node);
            
            if (step.type === "decision") {
              const branches = document.createElement("div");
              branches.className = "decision-branches";
              branches.innerHTML = `<span>[YES] ➔ ${step.yes}</span><span>[NO] ➔ ${step.no}</span>`;
              flowContainer.appendChild(branches);
            }
            
            if (sIdx < steps.length - 1) {
              const arrow = document.createElement("div");
              arrow.className = "flow-arrow";
              flowContainer.appendChild(arrow);
            }
          });
          
          content.appendChild(flowContainer);
          
          const comment = document.createElement("div");
          comment.className = "comment-box";
          comment.innerHTML = `<strong>Comment:</strong> ${generateComment(proc)}`;
          content.appendChild(comment);
          
          card.appendChild(content);
          catGroup.appendChild(card);
          index++;
        });
        
        main.appendChild(catGroup);
      });
    }

    window.onload = loadDepartment;
  </script>
</body>
